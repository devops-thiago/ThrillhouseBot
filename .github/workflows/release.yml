name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Existing tag to (re-)release, e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.inputs.version || github.ref_name }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/devops-thiago/thrillhousebot

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - name: Validate version is semver
        env:
          VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must be a semver tag like v0.1.0, got '$VERSION'"
            exit 1
          fi
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.version || github.ref_name }}
      - id: meta
        run: |
          TAG="${{ inputs.version || github.ref_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: "25"
          distribution: "temurin"
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Check tag matches pom.xml version
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          POM_VERSION=$(./mvnw -q help:evaluate -Dexpression=project.version -DforceStdout)
          if [ "v${POM_VERSION}" != "${TAG}" ]; then
            echo "::error::Tag ${TAG} does not match pom.xml version ${POM_VERSION}"
            exit 1
          fi
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: devops-thiago
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install crane
        run: |
          curl -fsSL https://github.com/google/go-containerregistry/releases/download/v0.20.6/go-containerregistry_Linux_x86_64.tar.gz \
            | tar -xzf - crane
          sudo install crane /usr/local/bin/crane
      - name: Check CI images exist for tagged commit
        run: |
          for ref in "${{ steps.meta.outputs.sha }}" "${{ steps.meta.outputs.sha }}-distroless"; do
            if ! crane digest "${IMAGE}:${ref}"; then
              echo "::error::No image ${IMAGE}:${ref} in GHCR — wait for main CI to finish, then re-run"
              exit 1
            fi
          done

  scan:
    needs: [verify]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.verify.outputs.tag }}
      # The trivy-scan composite action is referenced locally below. Local
      # actions resolve from the checked-out tree, but the tag above can predate
      # the action (e.g. re-releasing an old tag via workflow_dispatch). Check it
      # out from the workflow's own ref into a side path so it always resolves.
      - name: Check out reusable actions from the workflow ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: .actions-ref
          sparse-checkout: .github/actions
      - name: Resolve Trivy ignore policy for tagged commit
        run: |
          if [ -f .trivyignore ]; then
            echo "Using .trivyignore from ${{ needs.verify.outputs.tag }}"
            exit 0
          fi
          git fetch origin main --depth=1
          if git show origin/main:.trivyignore > .trivyignore 2>/dev/null; then
            echo "Tag has no .trivyignore; using scan policy from origin/main"
          else
            echo "::error::No .trivyignore on ${{ needs.verify.outputs.tag }} or origin/main"
            exit 1
          fi
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: devops-thiago
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Scan default image (gate on CRITICAL/HIGH)
        uses: ./.actions-ref/.github/actions/trivy-scan
        with:
          image-ref: ${{ env.IMAGE }}:${{ needs.verify.outputs.sha }}
          scanners: vuln
          exit-code: "1"
          trivyignores: .trivyignore
          category: trivy-release
      - name: Scan distroless image (gate on CRITICAL/HIGH)
        uses: ./.actions-ref/.github/actions/trivy-scan
        with:
          image-ref: ${{ env.IMAGE }}:${{ needs.verify.outputs.sha }}-distroless
          scanners: vuln
          exit-code: "1"
          trivyignores: .trivyignore
          category: trivy-release-distroless

  promote:
    needs: [verify, scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.digest.outputs.digest }}
      update_latest: ${{ steps.promote.outputs.update_latest }}
    steps:
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: devops-thiago
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install crane
        run: |
          curl -fsSL https://github.com/google/go-containerregistry/releases/download/v0.20.6/go-containerregistry_Linux_x86_64.tar.gz \
            | tar -xzf - crane
          sudo install crane /usr/local/bin/crane
      - name: Promote image tags
        id: promote
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.verify.outputs.tag }}"
          SHA="${{ needs.verify.outputs.sha }}"
          NEW_VER="${TAG#v}"

          crane tag "${IMAGE}:${SHA}" "${TAG}"
          crane tag "${IMAGE}:${SHA}-distroless" "${TAG}-distroless"

          UPDATE_LATEST=true
          HIGHEST_VER=$(gh release list --limit 200 --json tagName -q '.[].tagName' \
            | sed 's/^v//' \
            | sort -V \
            | tail -1)
          if [ -n "$HIGHEST_VER" ]; then
            HIGHEST=$(printf '%s\n%s' "$HIGHEST_VER" "$NEW_VER" | sort -V | tail -1)
            if [ "$HIGHEST" != "$NEW_VER" ]; then
              UPDATE_LATEST=false
              echo "Skipping :latest — ${TAG} is older than highest release v${HIGHEST_VER}"
            fi
          fi

          if [ "$UPDATE_LATEST" = true ]; then
            crane tag "${IMAGE}:${SHA}" latest
            crane tag "${IMAGE}:${SHA}-distroless" latest-distroless
          fi

          echo "update_latest=${UPDATE_LATEST}" >> "$GITHUB_OUTPUT"
      - id: digest
        run: |
          echo "digest=$(crane digest "${IMAGE}:${{ needs.verify.outputs.tag }}")" >> "$GITHUB_OUTPUT"
          echo "digest_distroless=$(crane digest "${IMAGE}:${{ needs.verify.outputs.tag }}-distroless")" >> "$GITHUB_OUTPUT"
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign images (keyless via Sigstore)
        run: |
          cosign sign --yes "${IMAGE}@${{ steps.digest.outputs.digest }}"
          cosign sign --yes "${IMAGE}@${{ steps.digest.outputs.digest_distroless }}"
      - name: Attest default image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true
      - name: Attest distroless image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.digest.outputs.digest_distroless }}
          push-to-registry: true

  release:
    needs: [verify, promote]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.verify.outputs.tag }}
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: devops-thiago
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract native binaries from image
        run: |
          TAG="${{ needs.verify.outputs.tag }}"
          mkdir -p dist
          for ARCH in amd64 arm64; do
            STAGE="thrillhousebot-${TAG}-linux-${ARCH}"
            mkdir -p "${STAGE}"
            docker pull --platform "linux/${ARCH}" "${IMAGE}:${TAG}"
            CID=$(docker create --platform "linux/${ARCH}" "${IMAGE}:${TAG}")
            docker cp "${CID}:/work/application" "${STAGE}/thrillhousebot"
            docker rm "${CID}"
            cp LICENSE README.md "${STAGE}/"
            tar -czf "dist/${STAGE}.tar.gz" -C "${STAGE}" .
          done
          (cd dist && sha256sum ./*.tar.gz > checksums.txt)
          ls -la dist/
      - name: Attest binary provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*.tar.gz
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign artifacts
        run: |
          for f in dist/*.tar.gz dist/checksums.txt; do
            cosign sign-blob --yes --bundle "${f}.sigstore" "$f"
          done
      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${{ needs.verify.outputs.tag }}"
          VERSION="${VERSION#v}"
          awk -v ver="${VERSION}" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            /^## \[/ { found=0 }
            found
          ' CHANGELOG.md > release_notes.md
          if ! grep -q '[^[:space:]]' release_notes.md; then
            echo "::error::No CHANGELOG.md content found for ${VERSION}"
            exit 1
          fi
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.verify.outputs.tag }}
          UPDATE_LATEST: ${{ needs.promote.outputs.update_latest }}
        run: |
          shopt -s nullglob
          artifacts=( dist/*.tar.gz dist/checksums.txt dist/*.sigstore )
          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "::error::No release artifacts found in dist/"
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; uploading artifacts and refreshing notes"
            gh release upload "$TAG" "${artifacts[@]}" --clobber
            edit_args=( "$TAG" --notes-file release_notes.md )
            if [ "$UPDATE_LATEST" = "true" ]; then
              edit_args+=( --latest )
            else
              edit_args+=( --latest=false )
            fi
            gh release edit "${edit_args[@]}"
          else
            args=( "$TAG" --notes-file release_notes.md )
            if [ "$UPDATE_LATEST" = "true" ]; then
              args+=( --latest )
            else
              args+=( --latest=false )
            fi
            args+=( "${artifacts[@]}" )
            gh release create "${args[@]}"
          fi

  bump-version:
    needs: [verify, release, promote]
    if: needs.promote.outputs.update_latest == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      # Opening the bump PR relies on the repo setting Settings → Actions → General →
      # "Allow GitHub Actions to create and approve pull requests" so the default
      # GITHUB_TOKEN may open it. If that setting is off, the branch is still pushed and a
      # tracking issue is opened instead — the bump is never lost. See docs/RELEASING.md.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: "25"
          distribution: "temurin"
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Compute next snapshot version
        id: next
        env:
          TAG: ${{ needs.verify.outputs.tag }}
        run: |
          BASE="${TAG#v}"
          NEXT="${BASE%.*}.$(( ${BASE##*.} + 1 ))-SNAPSHOT"
          NEXT_BASE="${NEXT%-SNAPSHOT}"
          MAIN_POM=$(./mvnw -q help:evaluate -Dexpression=project.version -DforceStdout)
          MAIN_BASE="${MAIN_POM%-SNAPSHOT}"
          if [ "$(printf '%s\n%s' "$MAIN_BASE" "$NEXT_BASE" | sort -V | tail -1)" = "$MAIN_BASE" ] \
            && [ "$MAIN_BASE" != "$NEXT_BASE" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "main is already at ${MAIN_POM}; skipping bump to ${NEXT}"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
      - name: Apply next snapshot version to pom.xml
        if: steps.next.outputs.skip != 'true'
        env:
          NEXT: ${{ steps.next.outputs.version }}
        run: ./mvnw -q versions:set -DnewVersion="$NEXT" -DgenerateBackupPoms=false
      - name: Open or update bump PR
        if: steps.next.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.verify.outputs.tag }}
          NEXT: ${{ steps.next.outputs.version }}
        run: |
          if git diff --quiet -- pom.xml; then
            echo "pom.xml is already at ${NEXT}; nothing to bump"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="chore/bump-${NEXT}"
          TITLE="chore: bump version to ${NEXT}"
          BODY="Moves \`main\` to \`${NEXT}\` after ${TAG}."
          git checkout -b "$BRANCH"
          git commit -am "${TITLE} after ${TAG}"
          # Avoid churning an already-open bump PR (and re-triggering its CI) on release
          # re-runs: only force-push when the remote branch doesn't already carry this bump.
          if git fetch origin "$BRANCH" 2>/dev/null && git diff --quiet FETCH_HEAD HEAD; then
            echo "origin/${BRANCH} already carries this bump; not force-pushing"
          else
            git push -f origin "$BRANCH"
          fi

          # Try to open the PR. This needs the repo setting "Allow GitHub Actions to
          # create and approve pull requests" (Settings → Actions → General); without it
          # the default GITHUB_TOKEN cannot open PRs. Distinguish the three outcomes
          # instead of masking failures:
          #   - success or an existing PR -> done
          #   - Actions-not-permitted     -> open a tracking issue (never lose the bump)
          #   - anything else             -> fail loudly
          if gh pr create --base main --head "$BRANCH" \
              --title "$TITLE" --body "$BODY" 2>pr_err.log; then
            echo "Opened bump PR for ${BRANCH}"
            exit 0
          fi
          cat pr_err.log

          if grep -qi "already exists" pr_err.log; then
            echo "Bump PR for ${BRANCH} already exists; nothing to do"
            exit 0
          fi

          if ! grep -qi "not permitted to create or approve pull requests" pr_err.log; then
            echo "::error::Failed to open bump PR for an unexpected reason (see log above)"
            exit 1
          fi

          echo "::warning::GitHub Actions is not permitted to open PRs; opening a tracking issue instead. Enable Settings → Actions → General → \"Allow GitHub Actions to create and approve pull requests\" to let releases open the bump PR automatically. See docs/RELEASING.md."
          ISSUE_TITLE="Release follow-up: open bump PR for ${NEXT}"
          EXISTING=$(gh issue list --state open --limit 100 --json number,title \
            -q ".[] | select(.title == \"${ISSUE_TITLE}\") | .number" | head -1)
          if [ -n "$EXISTING" ]; then
            echo "Tracking issue #${EXISTING} for ${NEXT} already open; nothing to do"
            exit 0
          fi
          gh issue create --title "$ISSUE_TITLE" --body "$(cat <<EOF
          The release of \`${TAG}\` succeeded, but the automated version-bump PR could
          not be opened because GitHub Actions is not permitted to create pull requests.

          Branch \`${BRANCH}\` has been pushed with the bump to \`${NEXT}\`. Open the PR
          to finish moving \`main\` to the next snapshot:

          \`\`\`bash
          gh pr create --base main --head ${BRANCH} --title "${TITLE}" --body "${BODY}"
          \`\`\`

          To open this PR automatically on future releases, enable the repo setting
          **Settings → Actions → General → "Allow GitHub Actions to create and approve
          pull requests"**. See [docs/RELEASING.md](docs/RELEASING.md).
          EOF
          )"
