name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop, "release/**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  actions: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          java-version: "25"
          distribution: "temurin"
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - run: ./mvnw spotless:check -q

  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      statuses: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          java-version: "25"
          distribution: "temurin"
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - run: ./mvnw clean test
      - run: ./mvnw spotbugs:check
      - run: ./mvnw jacoco:report
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: devops-thiago/thrillhousebot
          fail_ci_if_error: false
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: SonarCloud Scan
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./mvnw sonar:sonar

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --ignore-scripts
        working-directory: frontend
      - run: npm run test
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: npm audit --production --audit-level=high
        working-directory: frontend
        continue-on-error: true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: frontend-dist
          path: frontend/out/

  native-build:
    needs: [frontend]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          java-version: "25"
          distribution: "temurin"
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-dist
          path: src/main/resources/META-INF/resources/dashboard/
      - run: ./mvnw package -Pnative -DskipTests -Dquarkus.native.container-build=true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: native-binary-${{ matrix.arch }}
          path: target/*-runner

  docker:
    needs: [native-build, test, format]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: native-binary-amd64
          path: target/amd64/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: native-binary-arm64
          path: target/arm64/
      - run: chmod +x target/amd64/*-runner target/arm64/*-runner
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: devops-thiago
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive image tags from pom version
        id: tags
        run: |
          VERSION=$(python3 -c "
          import xml.etree.ElementTree as ET
          ns = {'m': 'http://maven.apache.org/POM/4.0.0'}
          print(ET.parse('pom.xml').getroot().find('m:version', ns).text)
          ")
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BASE_VER="${VERSION%-SNAPSHOT}"
          VERSIONED_SNAPSHOT="v${BASE_VER}-${SHORT_SHA}-snapshot"
          IMG="ghcr.io/devops-thiago/thrillhousebot"
          BASE_TAGS="${VERSIONED_SNAPSHOT} snapshot ${GITHUB_SHA}"
          default=""; distroless=""
          for t in $BASE_TAGS; do
            default="$default,$IMG:$t"
            distroless="$distroless,$IMG:$t-distroless"
          done
          echo "default=${default#,}" >> "$GITHUB_OUTPUT"
          echo "distroless=${distroless#,}" >> "$GITHUB_OUTPUT"
      - name: Build & push default image (UBI9)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: src/main/docker/Dockerfile.runtime
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.default }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & push distroless image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: src/main/docker/Dockerfile.runtime-distroless
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.distroless }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/trivy-scan
        with:
          scan-type: fs
          scanners: vuln
          severity: CRITICAL
          exit-code: "1"
          category: trivy-fs
          upload: ${{ github.event_name == 'push' }}

  trivy-image:
    needs: [docker]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: devops-thiago
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/trivy-scan
        with:
          image-ref: ghcr.io/devops-thiago/thrillhousebot:${{ github.sha }}
          category: trivy-image
      - uses: ./.github/actions/trivy-scan
        with:
          image-ref: ghcr.io/devops-thiago/thrillhousebot:${{ github.sha }}-distroless
          category: trivy-image-distroless

  docker-pr:
    needs: [frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          java-version: "25"
          distribution: "temurin"
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-dist
          path: src/main/resources/META-INF/resources/dashboard/
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - name: Build JVM package for Docker validation
        run: ./mvnw package -DskipTests -Dquarkus.package.jar.type=mutable-jar
      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: src/main/docker/Dockerfile.jvm
          push: false
          tags: ghcr.io/devops-thiago/thrillhousebot:pr-${{ github.event.pull_request.number }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
