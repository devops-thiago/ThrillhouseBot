name: "Dependency Review"

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          # Permissive/weak-copyleft licenses common in the Java and npm dependency
          # trees; replaces the deprecated deny-licenses option (see
          # actions/dependency-review-action#997)
          allow-licenses: >-
            MIT, MIT-0, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD,
            Unlicense, Zlib, EPL-1.0, EPL-2.0, MPL-1.1, MPL-2.0,
            LGPL-2.1-only, LGPL-2.1-or-later, LGPL-3.0-only, LGPL-3.0-or-later,
            GPL-2.0-only WITH Classpath-exception-2.0,
            GPL-2.0-or-later WITH Classpath-exception-2.0,
            CDDL-1.0, CDDL-1.1, UPL-1.0, CC0-1.0, CC-BY-4.0, BlueOak-1.0.0,
            Python-2.0, PSF-2.0
          # BOM imports and the build plugin are metadata-only artifacts whose
          # licenses the dependency graph can't resolve; all are Apache-2.0.
          # Unversioned purls so platform bumps don't re-trigger the warning.
          allow-dependencies-licenses: >-
            pkg:maven/io.netty/netty-bom,
            pkg:maven/io.opentelemetry/opentelemetry-bom,
            pkg:maven/io.opentelemetry/opentelemetry-bom-alpha,
            pkg:maven/io.quarkus.platform/quarkus-bom,
            pkg:maven/io.quarkus.platform/quarkus-maven-plugin
          comment-summary-in-pr: always
