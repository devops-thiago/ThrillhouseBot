name: Security Scan

# Weekly report-only CVE scan of the published images; results go to the
# Security tab.

on:
  schedule:
    - cron: "30 5 * * 1" # Mondays 05:30 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy-latest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: devops-thiago
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/trivy-scan
        with:
          image-ref: ghcr.io/devops-thiago/thrillhousebot:latest
          category: trivy-scheduled
      - uses: ./.github/actions/trivy-scan
        with:
          image-ref: ghcr.io/devops-thiago/thrillhousebot:latest-distroless
          category: trivy-scheduled-distroless
