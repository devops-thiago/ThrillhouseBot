name: Security Scan

# Weekly report-only CVE scan of the published images; results go to the
# Security tab.

on:
  schedule:
    - cron: "30 5 * * 1" # Mondays 05:30 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy-latest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: devops-thiago
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/trivy-scan
        with:
          image-ref: ghcr.io/devops-thiago/thrillhousebot:latest
          category: trivy-scheduled
      - uses: ./.github/actions/trivy-scan
        with:
          image-ref: ghcr.io/devops-thiago/thrillhousebot:latest-distroless
          category: trivy-scheduled-distroless
