name: Docs

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "docs/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "website/**"
      - "docs/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Runs on PRs too: the Astro build fails on broken internal links
  # (starlight-links-validator) and on missing include markers, so a docs PR
  # with a dead link or a broken README include fails here.
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
        working-directory: website
      - run: npm run build
        working-directory: website
      - if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: website/dist

  # Deploys only from main: pushes are branch-filtered above, and the ref guard
  # keeps a manual workflow_dispatch on a feature branch from publishing its docs.
  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # One-time prerequisite: enable Pages with Settings → Pages → Source:
      # "GitHub Actions" (or `gh api -X POST repos/<owner>/<repo>/pages
      # -f build_type=workflow`). GITHUB_TOKEN cannot enable Pages itself —
      # configure-pages `enablement` needs an admin token, so it is not used.
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
