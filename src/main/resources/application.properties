# GraalVM native image: static SecureRandom must be initialized at runtime.
quarkus.native.additional-build-args=\
  --initialize-at-run-time=dev.thiagogonzaga.thrillhousebot.dashboard.AuthResource,\
  --initialize-at-run-time=dev.thiagogonzaga.thrillhousebot.dashboard.DashboardSessionStore,\
  --initialize-at-run-time=dev.thiagogonzaga.thrillhousebot.review.PromptTemplateEscaper
