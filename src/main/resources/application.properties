# ============================================================
# ThrillhouseBot — Application Configuration
# ============================================================

# Server
quarkus.http.port=${PORT:8080}

# Outbound HTTP and dashboard WebSocket keepalive (tune for slow proxies / idle timeouts)
thrillhousebot.http-connect-timeout=${HTTP_CONNECT_TIMEOUT:10s}
thrillhousebot.http-request-timeout=${HTTP_REQUEST_TIMEOUT:10s}
thrillhousebot.websocket-keepalive-ms=${WEBSOCKET_KEEPALIVE_MS:25000}

# GitHub API base URL (for REST client)
github-api/mp-rest/url=https://api.github.com

# GitHub App — empty defaults keep config resolution from failing cryptically on a missing env
# var; StartupConfigValidator then fails fast at boot naming every missing/invalid key at once.
thrillhousebot.github.app-id=${GITHUB_APP_ID:}
thrillhousebot.github.private-key=${GITHUB_PRIVATE_KEY:}
thrillhousebot.github.webhook-secret=${GITHUB_WEBHOOK_SECRET:}
# Bot account login(s) used to skip the bot's own comments (loop protection). Override when the App
# is deployed under a different slug — its bot login is <app-slug>[bot].
thrillhousebot.github.bot-logins=${GITHUB_BOT_LOGINS:thrillhousebot[bot],thrillhouse-bot[bot]}

# Webhook redelivery dedup — drop repeat X-GitHub-Delivery ids within the TTL so GitHub
# redeliveries/retries do not trigger duplicate reviews (in-memory, per replica).
thrillhousebot.webhook.dedup-ttl=${WEBHOOK_DEDUP_TTL:24h}

# Automatic review trigger filters — empty defaults review every opened/reopened/synchronized PR.
# Narrow them to cut noise/cost; a manual /review comment always bypasses these filters.
#   WEBHOOK_SKIP_DRAFTS: skip while a PR is a draft (reviewed once marked ready / on later pushes)
#   WEBHOOK_REQUIRED_LABELS: only review PRs with at least one of these labels (case-insensitive)
#   WEBHOOK_EXCLUDED_LABELS: skip PRs carrying any of these labels (wins over required-labels)
#   WEBHOOK_BASE_BRANCHES: only review PRs whose base matches a glob (e.g. main,release/*)
#   WEBHOOK_IGNORED_BASE_BRANCHES: skip PRs whose base matches a glob (wins over base-branches)
#   Globs are gitignore-style: '*' does not cross '/', so use '**' to span slashes
#   (dependabot/** matches dependabot/npm/lodash; '**' alone matches every branch).
thrillhousebot.webhook.triggers.skip-drafts=${WEBHOOK_SKIP_DRAFTS:false}
thrillhousebot.webhook.triggers.required-labels=${WEBHOOK_REQUIRED_LABELS:}
thrillhousebot.webhook.triggers.excluded-labels=${WEBHOOK_EXCLUDED_LABELS:}
thrillhousebot.webhook.triggers.base-branches=${WEBHOOK_BASE_BRANCHES:}
thrillhousebot.webhook.triggers.ignored-base-branches=${WEBHOOK_IGNORED_BASE_BRANCHES:}

# LangChain4j over any OpenAI-compatible API (set AI_BASE_URL/AI_MODEL; DeepSeek is the default)
quarkus.langchain4j.openai.api-key=${AI_API_KEY:}
quarkus.langchain4j.openai.base-url=${AI_BASE_URL:https://api.deepseek.com/v1}
quarkus.langchain4j.openai.chat-model.model-name=${AI_MODEL:deepseek-chat}
# Mirror of the AI base URL into the typed config, used to derive the telemetry provider label
# (gen_ai.provider.name). References the client property above so the two never drift.
thrillhousebot.ai.base-url=${quarkus.langchain4j.openai.base-url}
# Leave AI_PROVIDER unset to derive the label from the base URL; set it to label ambiguous
# endpoints (self-hosted gateways, proxies, or local Ollama/vLLM servers).
thrillhousebot.ai.provider-name=${AI_PROVIDER:}
# Reasoning-effort control for reasoning-capable models. Disabled by default: no reasoning
# parameter is sent and the provider default applies. When enabled, the effort (none/low/medium/
# high) is sent as the OpenAI-compatible reasoning_effort on every chat call — providers map it to
# their thinking budgets; 'none' explicitly asks the model not to reason. Reasoning tokens are
# billed as output tokens, so enabling this raises cost and latency.
thrillhousebot.ai.reasoning.enabled=${AI_REASONING_ENABLED:false}
thrillhousebot.ai.reasoning.effort=${AI_REASONING_EFFORT:low}
# Per-model AI settings keyed by the model name (the AI_MODEL value), mirroring the pricing map's
# key scheme (#50). Only the active model's entry is read, so entries for several models can be
# kept and AI_MODEL switched freely. max-input-tokens is the model's input hard cap (its context
# window): the effective review budget is min(REVIEW_MAX_INPUT_TOKENS, cap), with a 128000 default
# cap for models without an entry. output-buffer-tokens and token-safety-margin override the
# review-level defaults per model; temperature, top-p, max-output-tokens, frequency-penalty,
# presence-penalty, and seed are sent on every chat call when set (the OpenAI-compatible wire
# carries no top_k). Keys containing '.' or '/' must be double-quoted.
#
# Empty stubs below are the Quarkus/SmallRye disambiguation for hyphenated map keys so
# THRILLHOUSEBOT_AI_MODELS__<MODEL>__<LEAF> env vars bind (e.g.
# THRILLHOUSEBOT_AI_MODELS_DEEPSEEK_V4_PRO_MAX_INPUT_TOKENS=1000000 for hyphen-only keys, or
# THRILLHOUSEBOT_AI_MODELS__GPT_5_5__MAX_INPUT_TOKENS for dotted keys). Value left empty =
# Optional unset; Env / -D / external application.properties supply the real value. See
# https://quarkus.io/guides/config-reference#environment-variables
# Examples of non-empty overrides:
#thrillhousebot.ai.models.deepseek-chat.max-input-tokens=64000
#thrillhousebot.ai.models.deepseek-chat.temperature=0.2
#thrillhousebot.ai.models."gpt-5.5".max-input-tokens=256000
#thrillhousebot.ai.models."gpt-5.5".max-output-tokens=8192
#thrillhousebot.ai.models.deepseek-chat.frequency-penalty=0.1
#thrillhousebot.ai.models.deepseek-chat.presence-penalty=0.1
#thrillhousebot.ai.models.deepseek-chat.seed=42
thrillhousebot.ai.models."gpt-5.5".max-input-tokens=
thrillhousebot.ai.models."gpt-5.5-pro".max-input-tokens=
thrillhousebot.ai.models."gpt-5.4".max-input-tokens=
thrillhousebot.ai.models."gpt-5.4-mini".max-input-tokens=
thrillhousebot.ai.models."gpt-5.4-nano".max-input-tokens=
thrillhousebot.ai.models.gpt-4o.max-input-tokens=
thrillhousebot.ai.models.gpt-4o-mini.max-input-tokens=
thrillhousebot.ai.models.deepseek-v4-flash.max-input-tokens=
thrillhousebot.ai.models.deepseek-v4-pro.max-input-tokens=
thrillhousebot.ai.models.deepseek-chat.max-input-tokens=
thrillhousebot.ai.models.deepseek-reasoner.max-input-tokens=
thrillhousebot.ai.models."qwen3.7-max".max-input-tokens=
thrillhousebot.ai.models."qwen3.7-plus".max-input-tokens=
thrillhousebot.ai.models."qwen3.6-plus".max-input-tokens=
thrillhousebot.ai.models."qwen3.5-plus".max-input-tokens=
thrillhousebot.ai.models."llama-3.3-70b-versatile".max-input-tokens=
thrillhousebot.ai.models."llama-3.1-8b-instant".max-input-tokens=
thrillhousebot.ai.models."openai/gpt-oss-20b".max-input-tokens=
thrillhousebot.ai.models."qwen/qwen3-32b".max-input-tokens=
quarkus.langchain4j.openai.timeout=${AI_TIMEOUT:300s}
quarkus.langchain4j.openai.chat-model.log-requests=false
quarkus.langchain4j.openai.chat-model.log-responses=false
%dev.quarkus.langchain4j.openai.chat-model.log-requests=true
%dev.quarkus.langchain4j.openai.chat-model.log-responses=true

# Logging — plain text in all profiles (JSON extension removed due to stack-trace formatting bug)

# OpenTelemetry
quarkus.otel.exporter.otlp.traces.endpoint=${OTEL_EXPORTER_ENDPOINT:http://localhost:4317}
quarkus.otel.service.name=thrillhousebot

# Review settings
thrillhousebot.review.max-review-comments=50
thrillhousebot.review.max-ai-retries=5
thrillhousebot.review.ai-retry-base-delay-ms=2000
# Client-side wait for each AI streaming attempt. Keep this >= quarkus.langchain4j.openai.timeout
# so timed-out attempts do not leave orphaned provider streams running until the HTTP read timeout.
thrillhousebot.review.ai-timeout-seconds=300
# Token-aware diff budgeting (#53): a large PR is split into per-call batches that each fit
# max-input-tokens (after the shared prompt overhead + output buffer), reviewed across up to
# max-ai-calls calls, then rolled up by one summary call. Every file is covered or listed by name —
# never silently dropped. Size max-input-tokens for the model's context window.
thrillhousebot.review.max-input-tokens=${REVIEW_MAX_INPUT_TOKENS:48000}
thrillhousebot.review.output-buffer-tokens=${REVIEW_OUTPUT_BUFFER_TOKENS:8192}
thrillhousebot.review.max-ai-calls=${REVIEW_MAX_AI_CALLS:6}
thrillhousebot.review.token-safety-margin=${REVIEW_TOKEN_SAFETY_MARGIN:0.9}
# Line cap on single-call renders (/describe, /changelog, /add-docs, replies, base comparison,
# budgeting-disabled review). Token-budgeted review calls ignore it; 0 = off (unbounded).
thrillhousebot.review.max-diff-lines=${REVIEW_MAX_DIFF_LINES:5000}
thrillhousebot.review.instructions-file=.github/thrillhousebot.md
# Second-pass AI audit that drops/downgrades unverifiable findings before they are posted
thrillhousebot.review.verifier-enabled=${REVIEW_VERIFIER_ENABLED:true}
# When a finding blocks the merge (REQUEST_CHANGES): balanced (default) = CRITICAL/HIGH + HIGH
# confidence; strict = any CRITICAL/HIGH; lenient = CRITICAL + HIGH confidence only.
thrillhousebot.review.blocking-strictness=${REVIEW_BLOCKING_STRICTNESS:balanced}
# Answer maintainer replies to findings and @thrillhousebot mentions in PR threads with an AI reply
thrillhousebot.review.conversational-replies-enabled=${REVIEW_CONVERSATIONAL_REPLIES_ENABLED:true}
# Allow the on-demand /add-docs command to generate docstrings as committable suggestions
thrillhousebot.review.add-docs-enabled=${REVIEW_ADD_DOCS_ENABLED:true}
thrillhousebot.review.ignored-files=**/pom.xml,**/package-lock.json,**/*.lock,**/*.generated.*,**/target/**
# Upper bound on the manual-trigger write-access check (token mint + collaborator-permission call)
# that runs on the webhook ACK thread; fails closed if GitHub is too slow to answer within the SLA.
thrillhousebot.review.manual-trigger-auth-timeout=${MANUAL_TRIGGER_AUTH_TIMEOUT:5s}
# Upper bound on the 👀 command-ack reaction (token mint + reaction POST) on the webhook ACK
# thread; when it elapses the wait is abandoned (the reaction may still land late) so a degraded
# GitHub can never delay the ACK past the delivery SLA.
thrillhousebot.review.ack-reaction-timeout=${ACK_REACTION_TIMEOUT:3s}
# Per-PR automatic review rate limit — while the last automatic review of a PR completed less than
# this ago, new pull_request events for it are skipped silently, even when the head SHA changed
# (in-memory, per replica). A manual /review always bypasses and never shifts the window; 0 disables.
thrillhousebot.review.auto-review-min-interval=${AUTO_REVIEW_MIN_INTERVAL:0}

# Context-aware PR labels (opt-in). When enabled, the model is shown the repo's existing labels
# and picks the ones that best describe the change. apply=false (default) only posts a suggestion
# comment on the first review; apply=true adds the labels to the PR. allow-create lets the bot
# create suggested labels that don't exist yet (off by default — the bot never invents labels).
thrillhousebot.review.labels.enabled=${REVIEW_LABELS_ENABLED:false}
thrillhousebot.review.labels.apply=${REVIEW_LABELS_APPLY:false}
thrillhousebot.review.labels.allow-create=${REVIEW_LABELS_ALLOW_CREATE:false}
thrillhousebot.review.labels.max-labels=${REVIEW_LABELS_MAX:3}

# Mermaid control-flow diagram in the PR summary (opt-in). When enabled, the model emits a small
# Mermaid diagram of the affected control flow for non-trivial changes, rendered as a collapsible
# block in the summary comment. Rides the existing review call (a few extra output tokens).
thrillhousebot.review.diagram.enabled=${REVIEW_DIAGRAM_ENABLED:false}

# Database (H2 for dev, PostgreSQL for prod)
quarkus.datasource.db-kind=${DATASOURCE_DB_KIND:h2}
quarkus.datasource.jdbc.url=jdbc:h2:mem:thrillhouse;DB_CLOSE_DELAY=-1
%prod.quarkus.datasource.db-kind=${DATASOURCE_DB_KIND:postgresql}
%prod.quarkus.datasource.jdbc.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/thrillhouse}
%prod.quarkus.hibernate-orm.schema-management.strategy=update

# Dashboard public base URL (session deep-links posted to GitHub) and OAuth login
thrillhousebot.dashboard.url=${DASHBOARD_URL:http://localhost:8080}
thrillhousebot.dashboard.github.oauth-url=${GITHUB_OAUTH_URL:https://github.com/login/oauth}
thrillhousebot.dashboard.github.client-id=${GITHUB_CLIENT_ID}
thrillhousebot.dashboard.github.client-secret=${GITHUB_CLIENT_SECRET}
thrillhousebot.dashboard.github.redirect-uri=${DASHBOARD_URL:http://localhost:8080}/api/auth/callback

