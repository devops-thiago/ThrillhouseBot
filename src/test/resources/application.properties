# Test Configuration — Overrides main application.properties for QuarkusTest
# Provides dummy values for required environment variables to allow Quarkus to start

quarkus.http.port=0
quarkus.http.test-port=0

# GitHub App (dummy values for tests)
thrillhousebot.github.app-id=12345
thrillhousebot.github.private-key=dummy-private-key-for-testing
thrillhousebot.github.webhook-secret=dummy-webhook-secret

# AI API (dummy values for tests)
AI_API_KEY=dummy-api-key
quarkus.langchain4j.openai.api-key=dummy-api-key

# Database (H2 for tests)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.schema-management.strategy=drop-and-create

# Dashboard OAuth (dummy values)
GITHUB_CLIENT_ID=dummy-client-id
GITHUB_CLIENT_SECRET=dummy-client-secret

# Skip extensions that aren't needed for tests
quarkus.otel.sdk.disabled=true

# JaCoCo — merge @QuarkusTest coverage with standard unit tests (see quarkus-jacoco)
quarkus.jacoco.enabled=true
quarkus.jacoco.data-file=target/jacoco-quarkus.exec
quarkus.jacoco.reuse-data-file=true
quarkus.jacoco.report=false
