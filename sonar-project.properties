sonar.projectKey=devops-thiago_ThrillhouseBot
sonar.organization=devops-thiago
sonar.projectName=ThrillhouseBot - AI PR Review Bot
sonar.projectVersion=1.0.0

# Source and test directories
sonar.sources=src/main/java
sonar.tests=src/test/java

# Java binaries (compiled classes)
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Java version
sonar.java.source=25
sonar.java.target=25

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage report paths
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=target/surefire-reports

# Exclusions
sonar.coverage.exclusions=**/review/ai/ReviewResponse.java

# SCM (Source Control Management)
sonar.scm.provider=git
sonar.scm.disabled=false

# Analysis parameters
# Set to false to not fail builds on quality gate issues (useful for PRs)
sonar.qualitygate.wait=false
