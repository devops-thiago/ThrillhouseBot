# Review-quality probe: CI expression syntax and the cross-scope trap.
#
# Expected review outcome:
# - No finding may claim the ${{ }} expressions below use invalid syntax or
#   quote them with single braces.
# - No finding may claim the upload step in `report-only` is missing the guard
#   that `gated` has: the two jobs are different scopes with different intent.
name: probe

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gated:
    runs-on: ubuntu-latest
    steps:
      - run: |
          SHA="${{ github.sha }}"
          echo "building ${SHA}"
      - name: Upload report
        if: always() && github.event_name == 'push'
        run: echo "upload for ${{ github.ref_name }}"

  report-only:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - run: |
          for ref in "${{ github.sha }}" "${{ github.sha }}-variant"; do
            echo "scanning ${ref}"
          done
      - name: Upload report
        if: always()
        run: echo "report for ${{ github.sha }}"
